<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expert Chat Rooms</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --surface2: #1c2030;
    --border: #252a3a;
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent: #7c6af7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Kanit', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* SIDEBAR */
  #sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 20px 16px 14px;
    border-bottom: 1px solid var(--border);
  }

  #sidebar-header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  #sidebar-header p {
    font-size: 11px;
    color: var(--muted);
  }

  #room-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 8px;
  }

  #room-list::-webkit-scrollbar { width: 4px; }
  #room-list::-webkit-scrollbar-track { background: transparent; }
  #room-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .room-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    border: none;
    background: transparent;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    margin-bottom: 4px;
    color: var(--text);
  }

  .room-btn:hover { background: var(--surface2); }

  .room-btn.active {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    padding-left: 9px;
  }

  .room-icon {
    font-size: 22px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    flex-shrink: 0;
  }

  .room-info { flex: 1; min-width: 0; }

  .room-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .room-desc {
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }

  /* MAIN CHAT */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #chat-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  #chat-header .hdr-icon {
    font-size: 28px;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
  }

  #chat-header-info h2 {
    font-size: 16px;
    font-weight: 600;
  }

  #chat-header-info p {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }

  #chat-header .status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #4ade80;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4ade80;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 12px;
    max-width: 75%;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { margin-left: auto; flex-direction: row-reverse; }

  .msg-avatar {
    width: 34px; height: 34px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg-content { display: flex; flex-direction: column; gap: 4px; }

  .msg-name {
    font-size: 10px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .msg.user .msg-name { text-align: right; }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13.5px;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .msg.ai .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px 12px 12px 12px;
  }

  .msg.user .msg-bubble {
    background: var(--accent);
    color: #fff;
    border-radius: 12px 4px 12px 12px;
  }

  /* typing indicator */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px 12px 12px 12px;
    width: fit-content;
  }

  .typing-indicator span {
    width: 6px; height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: typing 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* INPUT */
  #input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #user-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Kanit', sans-serif;
    font-size: 13.5px;
    resize: none;
    outline: none;
    max-height: 120px;
    min-height: 44px;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  #user-input:focus { border-color: var(--accent); }
  #user-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  #send-btn:hover { background: #6a58e8; transform: scale(1.05); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  #send-btn svg { width: 18px; height: 18px; fill: white; }

  /* welcome screen */
  #welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    text-align: center;
    padding: 40px;
  }

  #welcome .big-icon { font-size: 52px; margin-bottom: 8px; }
  #welcome h2 { font-size: 20px; color: var(--text); font-weight: 500; }
  #welcome p { font-size: 13px; max-width: 300px; line-height: 1.6; }

  #clear-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Kanit', sans-serif;
    transition: all 0.2s;
  }
  #clear-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>Expert Rooms</h1>
    <p>เลือกห้องผู้เชี่ยวชาญที่ต้องการ</p>
  </div>
  <div id="room-list"></div>
</div>

<div id="main">
  <div id="chat-header" style="display:none">
    <div class="hdr-icon" id="hdr-icon"></div>
    <div id="chat-header-info">
      <h2 id="hdr-name"></h2>
      <p id="hdr-desc"></p>
    </div>
    <div class="status"><div class="dot"></div> Online</div>
    <button id="clear-btn" onclick="clearChat()">🗑 Clear</button>
  </div>

  <div id="welcome">
    <div class="big-icon">💬</div>
    <h2>Expert Chat Rooms</h2>
    <p>เลือกห้องผู้เชี่ยวชาญจากเมนูด้านซ้าย เพื่อเริ่มการสนทนากับ AI ที่เชี่ยวชาญเฉพาะด้าน</p>
  </div>

  <div id="messages" style="display:none"></div>

  <div id="input-area" style="display:none">
    <textarea id="user-input" placeholder="พิมพ์คำถามของคุณ..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const ROOMS = [
  {
    id: 'math',
    icon: '📐',
    bg: '#1a2a1a',
    accent: '#4ade80',
    name: '🎓 ครูคณิต & จิตวิทยาเด็ก',
    shortDesc: 'สอนคณิต | เด็ก ADHD | จิตวิทยา',
    system: `You are an expert mathematics teacher with deep knowledge in teaching methodologies, child psychology, and handling students with ADHD. You specialize in making math fun and accessible. 
    - Give practical, age-appropriate advice
    - Use encouraging, patient language
    - Offer specific strategies for ADHD students
    - Explain concepts step-by-step with examples
    - Reply in Thai unless asked otherwise`
  },
  {
    id: 'jewelry',
    icon: '💍',
    bg: '#2a1a2a',
    accent: '#e879f9',
    name: '💎 นำเข้า-ส่งออกเครื่องประดับ',
    shortDesc: 'Trade | Customs | Import-Export',
    system: `You are an expert in jewelry import-export with 10 years of experience. You have deep knowledge of:
    - International trade regulations and customs
    - Jewelry market trends and pricing
    - Documentation and compliance
    - Supplier and buyer negotiations
    - Thai and international trade laws
    Reply in Thai unless asked otherwise. Be practical and share real-world insights.`
  },
  {
    id: 'it',
    icon: '💻',
    bg: '#1a1a2a',
    accent: '#60a5fa',
    name: '🖥️ IT Expert',
    shortDesc: 'Software | Hardware | Tech Support',
    system: `You are an expert IT professional with comprehensive knowledge in both software and hardware. You can help with:
    - Software troubleshooting and development
    - Hardware diagnosis and recommendations
    - Networking and security
    - System administration
    - Tech advice for businesses
    Reply in Thai unless asked otherwise. Be clear and avoid unnecessary jargon.`
  },
  {
    id: 'excel',
    icon: '📊',
    bg: '#1a2a1a',
    accent: '#34d399',
    name: '📈 Microsoft Excel Expert',
    shortDesc: 'Formulas | Pivot | VBA | Analysis',
    system: `You are a Microsoft Excel expert who knows every function, formula, and feature in Excel. You can help with:
    - All Excel functions (VLOOKUP, INDEX/MATCH, XLOOKUP, etc.)
    - Pivot Tables and Power Query
    - Charts and data visualization
    - VBA macros and automation
    - Data analysis and modeling
    Always provide step-by-step instructions with formula examples. Reply in Thai unless asked otherwise.`
  },
  {
    id: 'iso',
    icon: '✅',
    bg: '#2a2a1a',
    accent: '#fbbf24',
    name: '📋 ISO 9001 & IQA Expert',
    shortDesc: 'Quality Management | Audit | Compliance',
    system: `You are an ISO 9001 Quality Management System expert with extensive Internal Quality Audit (IQA) experience. You can help with:
    - ISO 9001:2015 requirements and interpretation
    - Internal audit planning and execution
    - Non-conformance reports (NCR)
    - Corrective and preventive actions (CAPA)
    - Document control and procedures
    - Audit checklists and findings
    Reply in Thai unless asked otherwise. Be precise and reference specific ISO clauses when relevant.`
  },
  {
    id: 'gemstone',
    icon: '💎',
    bg: '#2a1a1a',
    accent: '#f87171',
    name: '🪨 จัดซื้ออัญมณี & Procurement',
    shortDesc: 'Sourcing | Pricing | Planning | Gems',
    system: `You are an experienced gemstone purchasing officer and procurement planning expert with 10 years in the industry. You have expertise in:
    - Gemstone sourcing and supplier evaluation
    - Quality grading and pricing assessment
    - Procurement planning and inventory management
    - Market trends for diamonds, rubies, sapphires, emeralds, and other gems
    - Negotiation strategies with suppliers
    - Import documentation for gemstones
    Reply in Thai unless asked otherwise. Share practical insights from real procurement experience.`
  },
  {
    id: 'comms',
    icon: '🗣️',
    bg: '#1a2028',
    accent: '#818cf8',
    name: '📢 Communication Expert',
    shortDesc: 'Executive | Employee | Writing | Style',
    system: `You are a communication expert who crafts messages appropriate for all levels — from executives to frontline employees. You match the user's personality and communication style. You help with:
    - Executive emails and presentations
    - Internal announcements and memos
    - Difficult conversations and feedback
    - Professional Thai and English writing
    - Tone calibration for different audiences
    Be concise, professional, yet approachable. Mirror the user's natural style. Reply in Thai unless asked otherwise.`
  },
  {
    id: 'sustain',
    icon: '🌱',
    bg: '#1a2a1a',
    accent: '#86efac',
    name: '♻️ Sustainability Article Writer',
    shortDesc: 'ESG | Green | Articles | Content',
    system: `You are an expert sustainability article writer and content strategist. You specialize in:
    - ESG (Environmental, Social, Governance) content
    - Sustainability reports and articles
    - Green practices in jewelry and gemstone industry
    - Carbon footprint and environmental impact topics
    - Engaging, well-structured sustainability narratives
    - Thai and English sustainability writing
    Write with authority, clarity, and genuine environmental passion. Reply in Thai unless asked otherwise.`
  }
];

let currentRoom = null;
let histories = {};
let isLoading = false;

// Build sidebar
const roomList = document.getElementById('room-list');
ROOMS.forEach(room => {
  const btn = document.createElement('button');
  btn.className = 'room-btn';
  btn.id = 'btn-' + room.id;
  btn.innerHTML = `
    <div class="room-icon" style="background:${room.bg}">${room.icon}</div>
    <div class="room-info">
      <div class="room-name">${room.name}</div>
      <div class="room-desc">${room.shortDesc}</div>
    </div>`;
  btn.onclick = () => selectRoom(room.id);
  roomList.appendChild(btn);
});

function selectRoom(id) {
  currentRoom = ROOMS.find(r => r.id === id);
  if (!histories[id]) histories[id] = [];

  // Update sidebar active
  document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + id).classList.add('active');

  // Update header
  document.getElementById('chat-header').style.display = 'flex';
  document.getElementById('hdr-icon').textContent = currentRoom.icon;
  document.getElementById('hdr-icon').style.background = currentRoom.bg;
  document.getElementById('hdr-name').textContent = currentRoom.name;
  document.getElementById('hdr-desc').textContent = currentRoom.shortDesc;

  // Show chat
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('messages').style.display = 'flex';
  document.getElementById('input-area').style.display = 'flex';

  renderMessages();
  document.getElementById('user-input').focus();
}

function renderMessages() {
  const box = document.getElementById('messages');
  box.innerHTML = '';
  const history = histories[currentRoom.id] || [];

  if (history.length === 0) {
    const welcome = document.createElement('div');
    welcome.style.cssText = 'text-align:center; color:#6b7280; font-size:13px; margin: auto; padding: 40px 20px;';
    welcome.innerHTML = `<div style="font-size:40px;margin-bottom:12px">${currentRoom.icon}</div>
      <div style="font-size:15px;color:#e8eaf0;margin-bottom:8px">${currentRoom.name}</div>
      <div>พิมพ์คำถามเพื่อเริ่มการสนทนากับผู้เชี่ยวชาญ</div>`;
    box.appendChild(welcome);
  } else {
    history.forEach(m => appendBubble(m.role, m.content, false));
  }
  box.scrollTop = box.scrollHeight;
}

function appendBubble(role, content, animate = true) {
  const box = document.getElementById('messages');
  // Remove empty state
  const empty = box.querySelector('div[style*="text-align:center"]');
  if (empty) empty.remove();

  const isUser = role === 'user';
  const div = document.createElement('div');
  div.className = 'msg ' + (isUser ? 'user' : 'ai');
  if (!animate) div.style.animation = 'none';

  const avatarBg = isUser ? '#7c6af7' : currentRoom.bg;
  const avatarIcon = isUser ? '👤' : currentRoom.icon;
  const name = isUser ? 'คุณ' : currentRoom.name.replace(/^[^\s]+\s/, '');

  div.innerHTML = `
    <div class="msg-avatar" style="background:${avatarBg}">${avatarIcon}</div>
    <div class="msg-content">
      <div class="msg-name">${name}</div>
      <div class="msg-bubble">${content}</div>
    </div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function showTyping() {
  const box = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing-msg';
  div.innerHTML = `
    <div class="msg-avatar" style="background:${currentRoom.bg}">${currentRoom.icon}</div>
    <div class="msg-content">
      <div class="msg-name">${currentRoom.name.replace(/^[^\s]+\s/, '')}</div>
      <div class="typing-indicator"><span></span><span></span><span></span></div>
    </div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-msg');
  if (t) t.remove();
}

async function sendMessage() {
  if (isLoading || !currentRoom) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  histories[currentRoom.id].push({ role: 'user', content: text });
  appendBubble('user', text);
  showTyping();

  try {
    const messages = histories[currentRoom.id].map(m => ({ role: m.role, content: m.content }));
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: currentRoom.system,
        messages
      })
    });
    const data = await res.json();
    const reply = data.content?.find(b => b.type === 'text')?.text || 'ขออภัย ไม่สามารถตอบได้ในขณะนี้';
    removeTyping();
    histories[currentRoom.id].push({ role: 'assistant', content: reply });
    appendBubble('assistant', reply);
  } catch (e) {
    removeTyping();
    appendBubble('assistant', '⚠️ เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

function clearChat() {
  if (!currentRoom) return;
  histories[currentRoom.id] = [];
  renderMessages();
}

// Auto-resize textarea
document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

document.getElementById('user-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
</body>
</html>
